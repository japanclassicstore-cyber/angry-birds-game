<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angry Birds - Classic with Velocity Tracking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #90EE90 50%, #228B22 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #gameWrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border-radius: 10px;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: transparent;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 14px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            text-align: center;
        }
        #sidebar {
            width: 280px;
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-height: 700px;
            overflow-y: auto;
        }
        #sidebar h2 {
            color: #DC143C;
            margin-bottom: 15px;
            font-size: 20px;
            text-align: center;
        }
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .stat-box h3 {
            font-size: 14px;
            margin-bottom: 5px;
            opacity: 0.9;
        }
        .stat-box .value {
            font-size: 28px;
            font-weight: bold;
        }
        .velocity-meter {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .velocity-bar {
            height: 20px;
            background: linear-gradient(90deg, #00ff00 0%, #ffff00 50%, #ff0000 100%);
            border-radius: 10px;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }
        .velocity-fill {
            height: 100%;
            background: rgba(0,0,0,0.3);
            width: 0%;
            transition: width 0.1s;
        }
        .velocity-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            font-size: 12px;
            color: #333;
        }
        .shot-stats {
            background: #fff3cd;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 12px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #DC143C 0%, #8B0000 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        button:hover {
            transform: scale(1.02);
        }
        .info-box {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #1976d2;
        }
        @media (max-width: 1400px) {
            #gameWrapper {
                flex-direction: column;
                align-items: center;
            }
            #sidebar {
                width: 100%;
                max-width: 1200px;
                max-height: none;
            }
        }
    </style>
</head>
<body>
    <div id="gameWrapper">
        <div id="gameContainer">
            <canvas id="gameCanvas" width="1200" height="700"></canvas>
            <div id="ui">
                <div>Score: <span id="score">0</span></div>
                <div>Birds: <span id="birdsLeft">3</span></div>
                <div id="velocityDisplay" style="margin-top: 10px;">Vel: <span id="currentVelocity">0</span> m/s</div>
            </div>
            <div id="instructions">Drag the bird to aim • Release to launch</div>
        </div>
        
        <div id="sidebar">
            <h2>🎮 Angry Birds</h2>
            
            <div class="info-box">
                ✅ <strong>Velocity Tracking Active</strong><br>
                Launch power is now measured and displayed in real-time!
            </div>
            
            <div class="stat-box">
                <h3>Current Score</h3>
                <div class="value" id="sidebarScore">0</div>
            </div>
            
            <div class="velocity-meter">
                <h3>🚀 Launch Velocity</h3>
                <div class="velocity-bar">
                    <div class="velocity-fill" id="velocityFill"></div>
                    <div class="velocity-text" id="velocityText">0 m/s</div>
                </div>
                <div class="shot-stats" id="shotStats">
                    Max Velocity: <span id="maxVelocity">0</span> m/s | 
                    Avg: <span id="avgVelocity">0</span> m/s
                </div>
            </div>
            
            <button onclick="newGame()">🔄 New Game</button>
            
            <div style="margin-top: 15px; padding: 10px; background: #f5f5f5; border-radius: 5px; font-size: 12px; color: #666;">
                💡 <strong>Tip:</strong> Higher velocity = more damage to pigs!
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Audio context for sound effects
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        
        // Sound effects
        function playSound(type) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            switch(type) {
                case 'stretch':
                    oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.1);
                    break;
                case 'launch':
                    oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.3);
                    break;
                case 'hit':
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
                    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.2);
                    break;
                case 'destroy':
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(100, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.4);
                    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.4);
                    break;
                case 'pig':
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
                    oscillator.frequency.setValueAtTime(300, audioCtx.currentTime + 0.1);
                    oscillator.frequency.setValueAtTime(200, audioCtx.currentTime + 0.2);
                    gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.3);
                    break;
            }
        }

        // Game state
        let score = 0;
        let birdsLeft = 3;
        let currentBird = null;
        let isDragging = false;
        let gameObjects = [];
        let particles = [];
        
        // Velocity tracking
        let shotVelocities = [];
        let maxVelocity = 0;
        let currentShot = null;
        
        // Physics constants
        const GRAVITY = 0.5;
        const GROUND_Y = 600;
        const SLINGSHOT_POS = { x: 200, y: 450 };
        const MAX_DRAG = 100;
        
        // Classes
        class Bird {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.radius = 20;
                this.isLaunched = false;
                this.rotation = 0;
            }
            
            getVelocity() {
                return Math.sqrt(this.vx * this.vx + this.vy * this.vy);
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#DC143C';
                ctx.fill();
                ctx.strokeStyle = '#8B0000';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(-7, -5, 6, 0, Math.PI * 2);
                ctx.arc(7, -5, 6, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(-6, -5, 3, 0, Math.PI * 2);
                ctx.arc(8, -5, 3, 0, Math.PI * 2);
                ctx.fillStyle = 'black';
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(-12, -12);
                ctx.lineTo(-2, -8);
                ctx.moveTo(12, -12);
                ctx.lineTo(2, -8);
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, 2);
                ctx.lineTo(-8, 8);
                ctx.lineTo(8, 8);
                ctx.closePath();
                ctx.fillStyle = '#FFA500';
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(0, 8, 12, 0, Math.PI);
                ctx.fillStyle = '#FFE4B5';
                ctx.fill();
                
                ctx.restore();
            }
            
            update() {
                if (this.isLaunched) {
                    this.vy += GRAVITY;
                    this.x += this.vx;
                    this.y += this.vy;
                    this.rotation += 0.1;
                    
                    const vel = this.getVelocity();
                    document.getElementById('currentVelocity').textContent = vel.toFixed(1);
                    
                    if (currentShot && vel > currentShot.maxVel) {
                        currentShot.maxVel = vel;
                    }
                    
                    if (this.y + this.radius > GROUND_Y) {
                        this.y = GROUND_Y - this.radius;
                        this.vy *= -0.5;
                        this.vx *= 0.7;
                        if (Math.abs(this.vy) > 2) playSound('hit');
                        
                        if (currentShot) {
                            recordShot();
                        }
                    }
                    
                    if (this.x > canvas.width + 50 || this.x < -50) {
                        if (currentShot) recordShot();
                        resetBird();
                    }
                }
            }
        }
        
        class Pig {
            constructor(x, y, size = 'medium') {
                this.x = x;
                this.y = y;
                this.size = size;
                this.radius = size === 'small' ? 15 : size === 'large' ? 30 : 22;
                this.health = size === 'small' ? 1 : size === 'large' ? 3 : 2;
                this.maxHealth = this.health;
                this.active = true;
            }
            
            draw() {
                if (!this.active) return;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#7CFC00';
                ctx.fill();
                ctx.strokeStyle = '#228B22';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.beginPath();
                ctx.ellipse(0, 3, this.radius * 0.4, this.radius * 0.3, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#90EE90';
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(-4, 3, 2, 0, Math.PI * 2);
                ctx.arc(4, 3, 2, 0, Math.PI * 2);
                ctx.fillStyle = '#228B22';
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(-6, -5, 5, 0, Math.PI * 2);
                ctx.arc(6, -5, 5, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(-6, -5, 2.5, 0, Math.PI * 2);
                ctx.arc(6, -5, 2.5, 0, Math.PI * 2);
                ctx.fillStyle = 'black';
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(-this.radius + 5, -this.radius + 5, 6, 0, Math.PI * 2);
                ctx.arc(this.radius - 5, -this.radius + 5, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#7CFC00';
                ctx.fill();
                ctx.stroke();
                
                if (this.health < this.maxHealth) {
                    ctx.fillStyle = 'red';
                    ctx.fillRect(-this.radius, -this.radius - 10, (this.health / this.maxHealth) * this.radius * 2, 5);
                    ctx.strokeStyle = 'black';
                    ctx.strokeRect(-this.radius, -this.radius - 10, this.radius * 2, 5);
                }
                
                ctx.restore();
            }
            
            hit(damage, velocity) {
                this.health -= damage;
                playSound('pig');
                createParticles(this.x, this.y, '#7CFC00', 5);
                if (this.health <= 0) {
                    this.active = false;
                    const basePoints = this.size === 'small' ? 500 : this.size === 'large' ? 2000 : 1000;
                    const velocityBonus = Math.floor(velocity * 10);
                    score += basePoints + velocityBonus;
                    playSound('destroy');
                    createParticles(this.x, this.y, '#7CFC00', 20);
                    updateUI();
                }
            }
        }
        
        class Block {
            constructor(x, y, width, height, type = 'wood') {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.type = type;
                this.health = type === 'stone' ? 3 : 1;
                this.maxHealth = this.health;
                this.active = true;
            }
            
            draw() {
                if (!this.active) return;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                
                const color = this.type === 'stone' ? '#808080' : '#D2691E';
                const darkColor = this.type === 'stone' ? '#404040' : '#8B4513';
                
                ctx.fillStyle = color;
                ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
                
                ctx.strokeStyle = darkColor;
                ctx.lineWidth = 2;
                ctx.strokeRect(-this.width/2, -this.height/2, this.width, this.height);
                
                ctx.beginPath();
                if (this.type === 'wood') {
                    for (let i = 1; i < 4; i++) {
                        ctx.moveTo(-this.width/2 + i * this.width/4, -this.height/2);
                        ctx.lineTo(-this.width/2 + i * this.width/4, this.height/2);
                    }
                }
                ctx.stroke();
                
                if (this.health < this.maxHealth) {
                    ctx.fillStyle = 'rgba(255,0,0,0.3)';
                    ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
                }
                
                ctx.restore();
            }
            
            hit(damage) {
                this.health -= damage;
                playSound('hit');
                createParticles(this.x, this.y, this.type === 'stone' ? '#808080' : '#D2691E', 5);
                if (this.health <= 0) {
                    this.active = false;
                    score += this.type === 'stone' ? 300 : 150;
                    playSound('destroy');
                    createParticles(this.x, this.y, this.type === 'stone' ? '#808080' : '#D2691E', 15);
                    updateUI();
                }
            }
        }
        
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.color = color;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.03;
            }
            
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - 3, this.y - 3, 6, 6);
                ctx.globalAlpha = 1;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.life -= this.decay;
            }
        }
        
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }
        
        function recordShot() {
            if (!currentShot) return;
            
            shotVelocities.push(currentShot.maxVel);
            if (currentShot.maxVel > maxVelocity) {
                maxVelocity = currentShot.maxVel;
            }
            
            const avg = shotVelocities.reduce((a, b) => a + b, 0) / shotVelocities.length;
            document.getElementById('maxVelocity').textContent = maxVelocity.toFixed(1);
            document.getElementById('avgVelocity').textContent = avg.toFixed(1);
            
            currentShot = null;
        }
        
        function updateVelocityDisplay(power) {
            const maxPower = 15;
            const percentage = Math.min((power / maxPower) * 100, 100);
            document.getElementById('velocityFill').style.width = percentage + '%';
            document.getElementById('velocityText').textContent = power.toFixed(1) + ' m/s';
        }
        
        function initLevel() {
            gameObjects = [];
            shotVelocities = [];
            maxVelocity = 0;
            currentShot = null;
            
            const baseX = 900;
            const baseY = GROUND_Y;
            
            gameObjects.push(new Block(baseX - 60, baseY - 20, 40, 40, 'wood'));
            gameObjects.push(new Block(baseX + 60, baseY - 20, 40, 40, 'wood'));
            gameObjects.push(new Block(baseX, baseY - 40, 160, 20, 'wood'));
            gameObjects.push(new Block(baseX - 40, baseY - 70, 40, 40, 'wood'));
            gameObjects.push(new Block(baseX + 40, baseY - 70, 40, 40, 'stone'));
            gameObjects.push(new Block(baseX, baseY - 90, 120, 20, 'wood'));
            gameObjects.push(new Block(baseX, baseY - 120, 40, 40, 'wood'));
            gameObjects.push(new Block(baseX, baseY - 160, 60, 20, 'wood'));
            
            gameObjects.push(new Pig(baseX, baseY - 55, 'medium'));
            gameObjects.push(new Pig(baseX - 50, baseY - 25, 'small'));
            gameObjects.push(new Pig(baseX + 50, baseY - 110, 'small'));
            gameObjects.push(new Pig(baseX, baseY - 180, 'large'));
            
            resetBird();
        }
        
        function resetBird() {
            if (birdsLeft > 0) {
                birdsLeft--;
                currentBird = new Bird(SLINGSHOT_POS.x, SLINGSHOT_POS.y);
                updateUI();
            } else {
                currentBird = null;
                setTimeout(() => {
                    const pigsRemaining = gameObjects.filter(o => o instanceof Pig && o.active).length;
                    const status = pigsRemaining === 0 ? 'VICTORY!' : 'Game Over';
                    
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = pigsRemaining === 0 ? '#FFD700' : '#fff';
                    ctx.font = 'bold 60px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(status, canvas.width/2, canvas.height/2 - 50);
                    ctx.font = '30px Arial';
                    ctx.fillText(`Score: ${score}`, canvas.width/2, canvas.height/2 + 20);
                    ctx.font = '20px Arial';
                    ctx.fillText(`Max Velocity: ${maxVelocity.toFixed(1)} m/s`, canvas.width/2, canvas.height/2 + 60);
                }, 1000);
            }
        }
        
        function newGame() {
            score = 0;
            birdsLeft = 3;
            initLevel();
            updateUI();
            document.getElementById('maxVelocity').textContent = '0';
            document.getElementById('avgVelocity').textContent = '0';
            document.getElementById('velocityFill').style.width = '0%';
            document.getElementById('velocityText').textContent = '0 m/s';
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('sidebarScore').textContent = score;
            document.getElementById('birdsLeft').textContent = birdsLeft;
        }
        
        function drawSlingshot() {
            ctx.save();
            ctx.translate(SLINGSHOT_POS.x, SLINGSHOT_POS.y + 50);
            
            if (isDragging && currentBird) {
                ctx.beginPath();
                ctx.moveTo(-20, -30);
                ctx.lineTo(currentBird.x - SLINGSHOT_POS.x, currentBird.y - SLINGSHOT_POS.y - 50);
                ctx.strokeStyle = '#8B4513';
                ctx.lineWidth = 6;
                ctx.stroke();
            }
            
            ctx.beginPath();
            ctx.moveTo(0, 100);
            ctx.lineTo(-20, -30);
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 8;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(0, 100);
            ctx.lineTo(20, -30);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(-15, 20);
            ctx.lineTo(15, 20);
            ctx.lineWidth = 6;
            ctx.stroke();
            
            if (isDragging && currentBird) {
                ctx.beginPath();
                ctx.moveTo(20, -30);
                ctx.lineTo(currentBird.x - SLINGSHOT_POS.x, currentBird.y - SLINGSHOT_POS.y - 50);
                ctx.strokeStyle = '#8B4513';
                ctx.lineWidth = 6;
                ctx.stroke();
            }
            
            ctx.restore();
        }
        
        function drawBackground() {
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
            ctx.fillStyle = '#32CD32';
            ctx.fillRect(0, GROUND_Y, canvas.width, 10);
            
            drawCloud(100, 100);
            drawCloud(400, 80);
            drawCloud(700, 120);
            drawCloud(1000, 90);
        }
        
        function drawCloud(x, y) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.beginPath();
            ctx.arc(x, y, 30, 0, Math.PI * 2);
            ctx.arc(x + 30, y - 10, 35, 0, Math.PI * 2);
            ctx.arc(x + 60, y, 30, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function checkCollisions() {
            if (!currentBird || !currentBird.isLaunched) return;
            
            const birdVel = currentBird.getVelocity();
            
            for (let obj of gameObjects) {
                if (!obj.active) continue;
                
                if (obj instanceof Pig) {
                    const dx = currentBird.x - obj.x;
                    const dy = currentBird.y - obj.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < currentBird.radius + obj.radius) {
                        const damage = birdVel * 0.5;
                        obj.hit(Math.max(1, Math.floor(damage)), birdVel);
                        currentBird.vx *= 0.7;
                        currentBird.vy *= 0.7;
                    }
                } else if (obj instanceof Block) {
                    const closestX = Math.max(obj.x - obj.width/2, Math.min(currentBird.x, obj.x + obj.width/2));
                    const closestY = Math.max(obj.y - obj.height/2, Math.min(currentBird.y, obj.y + obj.height/2));
                    const dx = currentBird.x - closestX;
                    const dy = currentBird.y - closestY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < currentBird.radius) {
                        const damage = birdVel * 0.3;
                        obj.hit(Math.max(1, Math.floor(damage)));
                        currentBird.vx *= 0.5;
                        currentBird.vy *= 0.5;
                    }
                }
            }
        }
        
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            
            for (let obj of gameObjects) {
                obj.draw();
            }
            
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].draw();
                particles[i].update();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            drawSlingshot();
            
            if (currentBird) {
                currentBird.draw();
                currentBird.update();
                checkCollisions();
            }
            
            const pigsRemaining = gameObjects.filter(o => o instanceof Pig && o.active).length;
            if (pigsRemaining === 0 && birdsLeft >= 0 && currentBird === null) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 60px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('LEVEL CLEARED!', canvas.width/2, canvas.height/2);
                ctx.font = '30px Arial';
                ctx.fillText(`Score: ${score}`, canvas.width/2, canvas.height/2 + 50);
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        canvas.addEventListener('mousedown', (e) => {
            if (!currentBird || currentBird.isLaunched) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const dx = x - currentBird.x;
            const dy = y - currentBird.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < currentBird.radius + 20) {
                isDragging = true;
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging || !currentBird) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const dx = x - SLINGSHOT_POS.x;
            const dy = y - SLINGSHOT_POS.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist > MAX_DRAG) {
                const angle = Math.atan2(dy, dx);
                currentBird.x = SLINGSHOT_POS.x + Math.cos(angle) * MAX_DRAG;
                currentBird.y = SLINGSHOT_POS.y + Math.sin(angle) * MAX_DRAG;
            } else {
                currentBird.x = x;
                currentBird.y = y;
            }
            
            const powerDx = SLINGSHOT_POS.x - currentBird.x;
            const powerDy = SLINGSHOT_POS.y - currentBird.y;
            const power = Math.sqrt(powerDx * powerDx + powerDy * powerDy) * 0.15;
            updateVelocityDisplay(power);
            
            playSound('stretch');
        });
        
        canvas.addEventListener('mouseup', () => {
            if (!isDragging || !currentBird) return;
            
            isDragging = false;
            currentBird.isLaunched = true;
            
            const dx = SLINGSHOT_POS.x - currentBird.x;
            const dy = SLINGSHOT_POS.y - currentBird.y;
            const power = Math.sqrt(dx * dx + dy * dy) * 0.15;
            const angle = Math.atan2(dy, dx);
            
            currentBird.vx = Math.cos(angle) * power;
            currentBird.vy = Math.sin(angle) * power;
            
            currentShot = {
                maxVel: power,
                startTime: Date.now()
            };
            
            playSound('launch');
            
            setTimeout(() => {
                if (currentBird && Math.abs(currentBird.vx) < 0.5 && Math.abs(currentBird.vy) < 0.5) {
                    recordShot();
                    resetBird();
                }
            }, 5000);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousedown', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousemove', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });
        
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const mouseEvent = new MouseEvent('mouseup', {});
            canvas.dispatchEvent(mouseEvent);
        });
        
        initLevel();
        gameLoop();
    </script>
</body>
</html>
